name: alfakhir_desktop
description: Al-Fakhir Restaurant Management System (Windows)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^8.1.7
  shared_preferences: ^2.3.3
  pdf: ^3.12.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  charset_converter: ^2.1.1
  ffi: ^2.1.3
  win32: ^5.15.0

dependency_overrides:
  path_provider_foundation: 2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/restaurant_logo.jpg
    - assets/fonts/TraditionalArabic.ttf
    - assets/fonts/ReceiptArabic-segoeui.ttf
  fonts:
    - family: ReceiptArabic
      fonts:
        - asset: assets/fonts/TraditionalArabic.ttf
        - asset: assets/fonts/ReceiptArabic-segoeui.ttf
